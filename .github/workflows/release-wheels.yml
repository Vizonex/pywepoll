# Borrowed from pycares/cyares

name: Release Wheels

on:
  release:
    types:
      - published

permissions:                            
  id-token: write  

jobs:
  build_wheels:
    uses: ./.github/workflows/run-cibuildwheel.yml
    with:
      fail-fast: true

  build_sdist:
    uses: ./.github/workflows/run-sdist.yml

  upload_github:
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'release' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/*
        
  upload_pypi:
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - run: ls -lR dist
      
      # Disabled for right now while I work on distributing artifacts
      # - name: Upload to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     user: __token__
      #     # TODO: Move to trusted Publishing after winloop 0.1.91
      #     password: ${{ secrets.PYPI_PASSWORD }}
      
      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl

      - name: Upload artifact signatures to GitHub Release
        # Confusingly, this action also supports updating releases, not
        # just creating them. This is what we want here, since we've manually
        # created the release above.
        uses: softprops/action-gh-release@v3
        with:
          # dist/ contains the built packages, which smoketest-artifacts/
          # contains the signatures and certificates.
          files: dist/**
